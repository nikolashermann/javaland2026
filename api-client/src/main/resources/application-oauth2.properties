oauth2.registration-id=keycloak
spring.security.oauth2.client.registration.keycloak.client-id=api-client
spring.security.oauth2.client.registration.keycloak.client-secret=xxx
spring.security.oauth2.client.registration.keycloak.scope=api-server-scope
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://keycloak:8080/realms/javaland/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://keycloak:8080/realms/javaland/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/javaland/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://keycloak:8080/realms/javaland/protocol/openid-connect/userinfo