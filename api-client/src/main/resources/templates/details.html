<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">

<head>
    <title>Breuninger Article</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>

<body>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <img th:src="${article.image}" src="https://via.placeholder.com/400"
                 class="img-fluid rounded">
        </div>
        <div class="col-md-6">
            <h1 class="mb-3" th:text="${article.title}">Produktname</h1>
            <p class="text-muted">Bestand: <span th:text="${article.stock}">3</span></p>
            <p class="lead" th:text="${article.description}">Kurze Beschreibung des Produkts. Hier können wichtige
                Eigenschaften oder Highlights erwähnt
                werden.</p>
            <h3 class="text-success mb-3" th:text="${#numbers.formatCurrency(article.price)}">€ 49,99</h3>
            <button class="btn btn-primary btn-lg">In den Warenkorb</button>
        </div>
    </div>
</div>

</body>

</html>
