<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">

<head>
    <title>Breuninger Article</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>

<body>
<div class="container mt-5">
    <div class="d-flex align-items-baseline justify-content-between mb-4">
        <h1 class="h3 mb-0">Artikel</h1>
        <span class="text-muted" th:text="${#lists.size(articles)} + ' Treffer'">0 Treffer</span>
    </div>

    <div class="row g-4">
        <div th:each="article : ${articles}" class="col-12 col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
                <img th:src="${article.image}"
                     class="card-img-top"

                     alt="Artikelbild">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title mb-2" th:text="${article.title}">Article title</h5>

                    <p class="card-text text-muted mb-3"
                       style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;"
                       th:text="${article.description}">
                        Some quick example text to build on the card title and make up the bulk of the card's content.
                    </p>

                    <div class="mt-auto d-flex gap-2">
                        <a class="btn btn-primary"
                           th:href="@{/article/{id}(id=${article.id})}">
                            Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>

</html>
